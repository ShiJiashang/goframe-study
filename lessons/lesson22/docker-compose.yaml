services:
  app:
    build:
      context: ../..
      dockerfile: lessons/lesson22/Dockerfile
    ports:
      - "8000:8000"
    environment:
      AUTH_JWTSECRET: ${JWT_SECRET:-local-compose-only-change-me}
    volumes:
      - ./config.docker.yaml:/app/manifest/config/config.yaml:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-payment:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: local-mall-password
      MYSQL_DATABASE: goframe_mall
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../lesson11/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-plocal-mall-password"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  mock-payment:
    image: golang:1.26-alpine
    working_dir: /workspace
    command: ["go", "run", "./lessons/lesson19/mock-payment/main.go"]
    volumes:
      - ../..:/workspace:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9001/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
